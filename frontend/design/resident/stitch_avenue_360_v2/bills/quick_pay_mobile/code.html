<body class="bg-surface text-on-surface font-body antialiased selection:bg-primary-container selection:text-on-primary-container min-h-screen flex flex-col">
<!-- Top App Bar (Custom for Transactional Flow) -->
<header class="fixed top-0 w-full z-50 bg-surface/80 backdrop-blur-xl flex justify-between items-center px-6 py-4 max-w-md mx-auto left-0 right-0">
<div class="flex items-center gap-4">
<button class="text-on-surface-variant hover:opacity-80 transition-opacity p-2 -ml-2 rounded-full">
<span class="material-symbols-outlined text-2xl">arrow_back</span>
</button>
<div>
<h1 class="font-headline font-bold text-xl tracking-tight text-on-surface">Quick Pay</h1>
<p class="font-body text-xs text-on-surface-variant mt-0.5">Clear your dues instantly</p>
</div>
</div>
<button class="text-on-surface-variant hover:opacity-80 transition-opacity p-2 -mr-2 rounded-full">
<span class="material-symbols-outlined text-2xl">help_outline</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-grow pt-24 pb-12 px-6 max-w-md mx-auto w-full flex flex-col gap-8">
<!-- Hero Card: Total Outstanding -->
<section class="w-full">
<div class="bg-gradient-to-br from-primary to-primary-container rounded-[2rem] p-6 shadow-[0_12px_32px_rgba(25,28,29,0.06)] relative overflow-hidden">
<!-- Decorative pattern/glow -->
<div class="absolute top-0 right-0 w-48 h-48 bg-white/10 rounded-full blur-3xl -translate-y-1/2 translate-x-1/4 pointer-events-none"></div>
<div class="relative z-10 flex flex-col items-center text-center gap-2 mb-8">
<span class="font-label text-xs font-medium tracking-[0.05em] uppercase text-primary-fixed-dim bg-white/10 px-3 py-1 rounded-full inline-block backdrop-blur-sm">Total Outstanding</span>
<h2 class="font-display font-bold text-[2.5rem] leading-none tracking-[-0.02em] text-white my-1">₹3,570</h2>
<p class="font-body text-sm text-primary-fixed-dim">3 pending dues</p>
</div>
<div class="relative z-10">
<button class="w-full bg-white text-primary font-headline font-semibold py-4 rounded-xl shadow-sm hover:opacity-90 transition-all active:scale-95 flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 1;">bolt</span>
                        Pay All ₹3,570
                    </button>
</div>
</div>
</section>
<!-- Pending Dues Section -->
<section class="flex flex-col gap-4">
<div class="flex items-center justify-between px-1">
<h3 class="font-headline font-semibold text-lg tracking-tight text-on-surface">Pending Dues</h3>
<button class="text-primary font-headline font-medium text-sm hover:underline flex items-center gap-1">
<span class="material-symbols-outlined text-[16px]">filter_list</span>
                    Filter
                </button>
</div>
<div class="flex flex-col gap-4">
<!-- Due Card 1: Maintenance (Overdue) -->
<div class="bg-surface-container-lowest rounded-2xl p-5 shadow-[0_4px_16px_rgba(25,28,29,0.03)] border-l-4 border-error relative overflow-hidden group">
<div class="flex justify-between items-start gap-4 mb-4">
<div class="flex gap-3">
<div class="w-10 h-10 rounded-full bg-error-container/50 flex items-center justify-center text-error shrink-0">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">domain</span>
</div>
<div class="flex flex-col">
<h4 class="font-headline font-semibold text-base text-on-surface leading-tight">Maintenance</h4>
<p class="font-body text-xs text-on-surface-variant mt-1">June 2025</p>
</div>
</div>
<div class="text-right">
<span class="font-headline font-bold text-lg text-on-surface block leading-tight">₹2,200</span>
</div>
</div>
<div class="flex items-center justify-between pt-4 border-t border-outline-variant/15">
<div class="flex items-center gap-1.5 text-error bg-error-container/30 px-2.5 py-1 rounded-md">
<span class="material-symbols-outlined text-[14px]">warning</span>
<span class="font-label text-[10px] font-semibold tracking-wide uppercase">Overdue 5 days</span>
</div>
<button class="bg-gradient-to-br from-primary to-primary-container text-white px-5 py-2 rounded-xl font-headline font-medium text-sm shadow-sm hover:opacity-90 transition-all active:scale-95">
                            Pay
                        </button>
</div>
</div>
<!-- Due Card 2: Gas (Due Today) -->
<div class="bg-surface-container-lowest rounded-2xl p-5 shadow-[0_4px_16px_rgba(25,28,29,0.03)] border-l-4 border-secondary-container relative overflow-hidden group">
<div class="flex justify-between items-start gap-4 mb-4">
<div class="flex gap-3">
<div class="w-10 h-10 rounded-full bg-secondary-container/20 flex items-center justify-center text-secondary-container shrink-0">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">local_fire_department</span>
</div>
<div class="flex flex-col">
<h4 class="font-headline font-semibold text-base text-on-surface leading-tight">Gas</h4>
<p class="font-body text-xs text-on-surface-variant mt-1">June 2025</p>
</div>
</div>
<div class="text-right">
<span class="font-headline font-bold text-lg text-on-surface block leading-tight">₹850</span>
</div>
</div>
<div class="flex items-center justify-between pt-4 border-t border-outline-variant/15">
<div class="flex items-center gap-1.5 text-secondary-container bg-secondary-container/10 px-2.5 py-1 rounded-md">
<span class="material-symbols-outlined text-[14px]">schedule</span>
<span class="font-label text-[10px] font-semibold tracking-wide uppercase">Due today</span>
</div>
<button class="bg-gradient-to-br from-primary to-primary-container text-white px-5 py-2 rounded-xl font-headline font-medium text-sm shadow-sm hover:opacity-90 transition-all active:scale-95">
                            Pay
                        </button>
</div>
</div>
<!-- Due Card 3: Garbage (Due in 3 days) -->
<div class="bg-surface-container-lowest rounded-2xl p-5 shadow-[0_4px_16px_rgba(25,28,29,0.03)] border-l-4 border-transparent relative overflow-hidden group">
<div class="flex justify-between items-start gap-4 mb-4">
<div class="flex gap-3">
<div class="w-10 h-10 rounded-full bg-surface-container-high flex items-center justify-center text-on-surface-variant shrink-0">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">delete</span>
</div>
<div class="flex flex-col">
<h4 class="font-headline font-semibold text-base text-on-surface leading-tight">Garbage Collection</h4>
<p class="font-body text-xs text-on-surface-variant mt-1">June 2025</p>
</div>
</div>
<div class="text-right">
<span class="font-headline font-bold text-lg text-on-surface block leading-tight">₹200</span>
</div>
</div>
<div class="flex items-center justify-between pt-4 border-t border-outline-variant/15">
<div class="flex items-center gap-1.5 text-on-surface-variant bg-surface-container-low px-2.5 py-1 rounded-md">
<span class="material-symbols-outlined text-[14px]">calendar_today</span>
<span class="font-label text-[10px] font-semibold tracking-wide uppercase">Due in 3 days</span>
</div>
<button class="bg-gradient-to-br from-primary to-primary-container text-white px-5 py-2 rounded-xl font-headline font-medium text-sm shadow-sm hover:opacity-90 transition-all active:scale-95">
                            Pay
                        </button>
</div>
</div>
</div>
</section>
