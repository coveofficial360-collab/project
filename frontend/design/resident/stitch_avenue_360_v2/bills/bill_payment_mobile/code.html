<body class="bg-surface text-on-surface font-body antialiased min-h-screen pb-28">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-surface/80 dark:bg-surface/80 backdrop-blur-xl">
<div class="flex justify-between items-center px-6 py-4 w-full max-w-screen-2xl mx-auto">
<div class="flex items-center gap-4">
<button class="text-primary dark:text-primary-fixed-dim hover:opacity-80 transition-opacity active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined text-2xl" data-icon="arrow_back">arrow_back</span>
</button>
<div>
<h1 class="font-headline text-headline-sm tracking-tight text-on-surface font-semibold">Gas Payment</h1>
<p class="font-body text-sm text-on-surface-variant">Indraprastha Gas</p>
</div>
</div>
<button class="text-primary dark:text-primary-fixed-dim hover:opacity-80 transition-opacity active:scale-95 transition-transform duration-200">
<span class="material-symbols-outlined text-2xl" data-icon="more_vert">more_vert</span>
</button>
</div>

<p class="font-body text-sm text-on-primary/80 uppercase tracking-widest font-medium">Amount Due</p>
<h2 class="font-display text-5xl font-extrabold tracking-tight">₹850</h2>
<div class="bg-white/20 px-4 py-1.5 rounded-full backdrop-blur-sm mt-2">
<p class="font-label text-xs font-medium text-on-primary">Due by 20 Jun 2025</p>
</div>
</div>
<div class="relative z-10 mt-8 flex justify-between items-center border-t border-white/20 pt-4">
<p class="font-body text-sm text-on-primary/80">Consumer ID</p>
<p class="font-body text-sm font-semibold text-on-primary">1234567890</p>
</div>
</div>
<!-- Bill Details -->

<h3 class="font-headline text-lg font-semibold text-on-surface mb-6 flex items-center gap-2">
<span class="material-symbols-outlined text-primary" data-icon="receipt_long">receipt_long</span>

            </h3>
<div class="space-y-4">
<div class="flex justify-between items-center">
<span class="font-body text-sm text-on-surface-variant">Period</span>
<span class="font-body text-sm font-medium text-on-surface">May 2025</span>
</div>
<div class="flex justify-between items-center">
<span class="font-body text-sm text-on-surface-variant">Units Consumed</span>
<span class="font-body text-sm font-medium text-on-surface">12</span>
</div>
<div class="flex justify-between items-center">
<span class="font-body text-sm text-on-surface-variant">Bill Date</span>
<span class="font-body text-sm font-medium text-on-surface">05 Jun 2025</span>
</div>

<span class="font-body text-sm text-on-surface-variant">Due Date</span>
<span class="font-body text-sm font-medium text-on-surface">20 Jun 2025</span>
</div>
</div>

<span class="material-symbols-outlined text-primary" data-icon="account_balance_wallet">account_balance_wallet</span>
                Select Payment Method
            </h3>
<div class="space-y-3">
<!-- UPI (Selected) -->

<div class="ml-4 flex items-center gap-3 relative z-10 w-full">
<div class="w-10 h-10 bg-surface-container rounded-full flex items-center justify-center text-primary">
<span class="material-symbols-outlined" data-icon="qr_code_scanner">qr_code_scanner</span>

<div class="flex-1">
<p class="font-body font-medium text-on-surface">UPI</p>

<div class="w-10 h-10 bg-surface-container rounded-full flex items-center justify-center text-on-surface-variant">
<span class="material-symbols-outlined" data-icon="credit_card">credit_card</span>
</div>
<div class="flex-1">
<p class="font-body font-medium text-on-surface">Credit / Debit Card</p>
<p class="font-body text-xs text-on-surface-variant">Visa, Mastercard, RuPay</p>
</div>
<img alt="Card Logos" class="h-6 object-contain opacity-60" data-alt="A row of generic, stylized credit card network logos. The design is sleek, flat, and vector-based, featuring standard rectangular card silhouettes with subtle gradients. The color palette is muted and professional, blending seamlessly into a clean, modern white UI canvas." src="https://lh3.googleusercontent.com/aida/ADBb0uhWbKC9XWkz_N9MDcLsvB1XTmoqrQu4ddrizWBSMlK3xtZo3vskAfGVpQ6_oIJcPxeOPswN_5uAVSxx1XU2GrBO-oew0JRHWK2VEijMssROgYYJJCXJMFqOoxbj_h5U_0YXMl4gMg_YrNSirhJmMqopo06z77mYwkTUejL516kEOXQ09FFnpuqwqHb9VKmlgiBs_nrSntfBirud-RKgne1yv5Luq08sy_yFyV5x1BocqObnrbIdS7e8xth1rZFfF7kjZYqYYpCMNQ"/>

<input class="form-radio text-primary focus:ring-primary h-5 w-5 border-outline-variant" name="payment" type="radio" value="netbanking"/>
<div class="ml-4 flex items-center gap-3 w-full">
<div class="w-10 h-10 bg-surface-container rounded-full flex items-center justify-center text-on-surface-variant">
<span class="material-symbols-outlined" data-icon="account_balance">account_balance</span>
</div>
<div class="flex-1">
<p class="font-body font-medium text-on-surface">Net Banking</p>
<p class="font-body text-xs text-on-surface-variant">All major banks supported</p>
</div>
</div>
</label>
</div>
</section>
