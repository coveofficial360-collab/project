<div class="absolute bottom-0 left-0 w-full h-[2px] bg-primary scale-x-0 group-focus-within:scale-x-100 transition-transform origin-left"></div>
</div>
<!-- OR Divider -->
<div class="flex items-center gap-4 py-1">
<div class="flex-1 h-px bg-surface-variant"></div>
<span class="font-label text-[10px] md:text-xs uppercase tracking-wider text-on-surface-variant">Or</span>
<div class="flex-1 h-px bg-surface-variant"></div>

<button class="flex flex-col items-center justify-center gap-1.5 md:gap-2 p-2 md:p-3 bg-surface-container-lowest rounded-xl shadow-[0_8px_24px_rgba(25,28,29,0.04)] hover:bg-surface-container-low transition-colors border border-outline-variant/5">
<img alt="PhonePe Logo" class="w-8 h-8 md:w-10 md:h-10 rounded-full object-cover" data-alt="A vibrant purple gradient app icon" src="https://lh3.googleusercontent.com/aida-public/AB6AXuAz0PVaz-qzSKS-ZTSlZWek4MUkDAFyZ3EL4U4EZuczbF7Ii-_Jp1TtpDADd0-HGAqDfxzZ83dd3C0OxM3xenfukcSemHs6dxk8N2c5Iyb8xe_rr5jzJ4I2AsCz29E_7DU34M7N4Q4oQ8aNGO9CRAYkB_HlYrYgaMigNjBW9N4wDRJ6HxDTl8-HQbCsDUgmkOMF7P1s8Yk_UVqWnlBjg4214wd9XN9NXmxx1mOBWUvDyD-T1GIPw_0mcO2shzstgLwSZnXeHGjuvhY"/>

<button class="w-full h-12 md:h-14 rounded-full bg-gradient-to-br from-primary to-primary-container text-on-primary font-headline font-semibold text-sm md:text-base shadow-[0_8px_20px_rgba(0,91,191,0.2)] hover:opacity-95 active:scale-[0.98] transition-all flex items-center justify-center gap-2">

                Cancel transaction
            </button>
</div>
</div>
</body></html>
